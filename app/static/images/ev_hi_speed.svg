<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220">
  <rect width="360" height="220" rx="16" fill="#e8f0fe"/>
  <!-- Body -->
  <ellipse cx="180" cy="148" rx="72" ry="18" fill="#b0bec5" opacity="0.4"/>
  <!-- Rear wheel -->
  <circle cx="108" cy="158" r="30" fill="#263238"/>
  <circle cx="108" cy="158" r="20" fill="#455a64"/>
  <circle cx="108" cy="158" r="8" fill="#90a4ae"/>
  <!-- Front wheel -->
  <circle cx="268" cy="158" r="30" fill="#263238"/>
  <circle cx="268" cy="158" r="20" fill="#455a64"/>
  <circle cx="268" cy="158" r="8" fill="#90a4ae"/>
  <!-- Main scooter body -->
  <path d="M120 155 L130 110 L200 105 L240 115 L255 155 Z" fill="#1565c0"/>
  <!-- Seat -->
  <rect x="130" y="100" width="70" height="14" rx="7" fill="#0d47a1"/>
  <!-- Front fairing -->
  <path d="M240 115 L265 130 L268 155 L255 155 Z" fill="#1976d2"/>
  <!-- Windshield -->
  <path d="M242 118 L260 128 L258 118 Z" fill="#bbdefb" opacity="0.8"/>
  <!-- Handlebar -->
  <rect x="252" y="108" width="4" height="22" rx="2" fill="#37474f"/>
  <rect x="244" y="108" width="16" height="5" rx="2" fill="#546e7a"/>
  <!-- Footrest -->
  <rect x="118" y="152" width="30" height="5" rx="2" fill="#37474f"/>
  <!-- Rear frame -->
  <path d="M130 110 L115 155" stroke="#0d47a1" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Battery/engine block -->
  <rect x="155" y="118" width="50" height="30" rx="6" fill="#0d47a1"/>
  <rect x="160" y="122" width="40" height="8" rx="3" fill="#ffd600"/>
  <!-- Lightning bolt -->
  <text x="172" y="148" fill="#ffd600" font-size="16" font-weight="900">⚡</text>
  <!-- Label -->
  <text x="50%" y="208" dominant-baseline="middle" text-anchor="middle" fill="#1565c0" font-size="15" font-family="Arial, sans-serif" font-weight="800">Hi-Speed EV Scooter</text>
</svg>
