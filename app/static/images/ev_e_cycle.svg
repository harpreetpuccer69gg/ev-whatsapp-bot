<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220">
  <rect width="360" height="220" rx="16" fill="#e8f5e9"/>
  <!-- Shadow -->
  <ellipse cx="180" cy="168" rx="75" ry="10" fill="#a5d6a7" opacity="0.4"/>
  <!-- Rear wheel -->
  <circle cx="100" cy="158" r="34" fill="#1b5e20"/>
  <circle cx="100" cy="158" r="24" fill="#2e7d32"/>
  <circle cx="100" cy="158" r="9" fill="#81c784"/>
  <!-- Spokes rear -->
  <line x1="100" y1="124" x2="100" y2="192" stroke="#1b5e20" stroke-width="2"/>
  <line x1="66" y1="158" x2="134" y2="158" stroke="#1b5e20" stroke-width="2"/>
  <line x1="76" y1="134" x2="124" y2="182" stroke="#1b5e20" stroke-width="2"/>
  <line x1="76" y1="182" x2="124" y2="134" stroke="#1b5e20" stroke-width="2"/>
  <!-- Front wheel -->
  <circle cx="268" cy="158" r="34" fill="#1b5e20"/>
  <circle cx="268" cy="158" r="24" fill="#2e7d32"/>
  <circle cx="268" cy="158" r="9" fill="#81c784"/>
  <!-- Spokes front -->
  <line x1="268" y1="124" x2="268" y2="192" stroke="#1b5e20" stroke-width="2"/>
  <line x1="234" y1="158" x2="302" y2="158" stroke="#1b5e20" stroke-width="2"/>
  <line x1="244" y1="134" x2="292" y2="182" stroke="#1b5e20" stroke-width="2"/>
  <line x1="244" y1="182" x2="292" y2="134" stroke="#1b5e20" stroke-width="2"/>
  <!-- Frame -->
  <path d="M100 158 L155 100 L220 158" stroke="#2e7d32" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155 100 L268 158" stroke="#2e7d32" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M220 158 L268 158" stroke="#2e7d32" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Seat post -->
  <line x1="175" y1="100" x2="175" y2="75" stroke="#1b5e20" stroke-width="8" stroke-linecap="round"/>
  <!-- Seat -->
  <rect x="158" y="68" width="36" height="10" rx="5" fill="#4e342e"/>
  <!-- Handlebar post -->
  <line x1="255" y1="130" x2="255" y2="100" stroke="#1b5e20" stroke-width="7" stroke-linecap="round"/>
  <!-- Handlebar -->
  <rect x="240" y="98" width="30" height="6" rx="3" fill="#33691e"/>
  <!-- Battery on frame -->
  <rect x="155" y="118" width="55" height="28" rx="6" fill="#388e3c"/>
  <rect x="160" y="122" width="45" height="10" rx="4" fill="#ffd600"/>
  <text x="168" y="142" fill="#1b5e20" font-size="11" font-weight="900">E-CYCLE</text>
  <!-- Pedal -->
  <circle cx="185" cy="158" r="10" fill="#33691e"/>
  <line x1="175" y1="158" x2="195" y2="158" stroke="#ffd600" stroke-width="4" stroke-linecap="round"/>
  <!-- Label -->
  <text x="50%" y="210" dominant-baseline="middle" text-anchor="middle" fill="#1b5e20" font-size="15" font-family="Arial, sans-serif" font-weight="800">Electric Cargo Cycle</text>
</svg>
